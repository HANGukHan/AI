<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace - Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-glow: conic-gradient(from 180deg at 50% 50%, #16abff 0deg, #0885ff 55deg, #54d6ff 120deg, #0071ff 160deg, transparent 360deg);
            --secondary-glow: radial-gradient(circle, rgba(120, 119, 198, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-purple: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Glow Effects */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-glow);
            filter: blur(90px);
            opacity: 0.15;
            top: 20%;
            left: 20%;
            z-index: 0;
            animation: float-glow 20s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--secondary-glow);
            filter: blur(80px);
            bottom: 10%;
            right: 15%;
            z-index: 0;
            animation: float-glow-reverse 25s infinite alternate;
        }

        @keyframes float-glow {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(80px, 50px) rotate(180deg) scale(1.2); }
        }

        @keyframes float-glow-reverse {
            0% { transform: translate(0, 0) scale(1.2); }
            100% { transform: translate(-100px, -80px) scale(0.8); }
        }

        /* Container Card with Glassmorphism */
        .container {
            z-index: 10;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transform: translateY(20px);
            opacity: 0;
            animation: fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fade-in-up {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Main Icon / Graphic */
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.3);
            position: relative;
            overflow: hidden;
            animation: pulse-border 3s infinite alternate;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            animation: shine 4s infinite ease-in-out;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 8px 30px rgba(56, 189, 248, 0.3); }
            100% { transform: scale(1.05); box-shadow: 0 8px 35px rgba(192, 132, 252, 0.5); }
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent);
            animation: blink 1.5s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Interactive Action Card */
        .deployment-info {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 1.25rem;
            border-radius: 16px;
            text-align: left;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-value {
            color: #ffffff;
            font-family: monospace;
            font-weight: 600;
        }

        /* Button hover animations */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: #ffffff;
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: var(--accent);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(56, 189, 248, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span>
            Ready to Deploy
        </div>
        <div class="icon-container">
            <!-- Sparkles SVG Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M12 2L14.7 8.3L21 11L14.7 13.7L12 20L9.3 13.7L3 11L9.3 8.3L12 2Z" />
            </svg>
        </div>
        <h1>AI Workspace</h1>
        <p>Vercel 호스팅을 위한 테스트 준비가 완료되었습니다. 이 파일은 Vercel 프리뷰 및 프로덕션 배포 시 호스팅됩니다.</p>
        
        <div class="deployment-info">
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-value" style="color: var(--accent);">Ready</span>
            </div>
            <div class="info-row">
                <span class="info-label">Framework</span>
                <span class="info-value">Vanilla HTML/CSS</span>
            </div>
            <div class="info-row">
                <span class="info-label">Repository</span>
                <span class="info-value">HANGukHan/AI</span>
            </div>
        </div>

        <button class="btn" onclick="alert('배포가 성공적으로 완료되었습니다!')">Workspace 확인하기</button>
    </div>
</body>
</html>
